version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Australia/Brisbane"
    commit-message:
      prefix: "deps"
      include: "scope"

updates:
  - package-ecosystem: "bun"
    directories:
      - "/"
      - "/web"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    groups:
      bun-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "swift"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    groups:
      swift-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    groups:
      actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"
