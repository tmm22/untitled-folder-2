name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: Swift tests
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run Swift tests
        run: swift test

  web:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Validate root Bun lockfile
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Lint web app
        working-directory: web
        run: bun run lint

      - name: Test web app
        working-directory: web
        run: bun run test

      - name: Build web app
        working-directory: web
        run: bun run build
