name: Dependabot auto-merge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Merge verified Dependabot PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          REPO: ${{ github.repository }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [ -z "$PR_NUMBER" ]; then
            echo "No pull request was attached to this workflow run."
            exit 0
          fi

          author="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author --jq '.author.login')"
          if [ "$author" != "dependabot[bot]" ]; then
            echo "Skipping PR #$PR_NUMBER because it was opened by $author."
            exit 0
          fi

          state="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state')"
          is_draft="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json isDraft --jq '.isDraft')"
          head_sha="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')"

          if [ "$state" != "OPEN" ] || [ "$is_draft" != "false" ]; then
            echo "Skipping PR #$PR_NUMBER because state=$state draft=$is_draft."
            exit 0
          fi

          if [ "$head_sha" != "$WORKFLOW_HEAD_SHA" ]; then
            echo "Skipping PR #$PR_NUMBER because CI passed for $WORKFLOW_HEAD_SHA, but the PR head is $head_sha."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash --delete-branch ||
            gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --delete-branch
